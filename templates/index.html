<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HeartGuard AI - Prediction</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { background-color: #f8fafc; }
    </style>
</head>
<body class="bg-slate-100">
    <div class="max-w-3xl mx-auto px-4 py-10">
        
        <!-- Header -->
        <div class="flex items-center justify-center gap-x-4 mb-10">
            <div class="w-14 h-14 bg-red-600 rounded-2xl flex items-center justify-center">
                <i class="fa-solid fa-heart-pulse text-white text-4xl"></i>
            </div>
            <div>
                <h1 class="text-4xl font-bold text-slate-800">HeartGuard AI</h1>
                <p class="text-slate-500">Real-time Heart Disease Risk Assessment</p>
            </div>
        </div>

        <div class="bg-white rounded-3xl shadow-sm border p-8">
            
            <!-- Input Section -->
            <h2 class="text-xl font-semibold mb-6 flex items-center gap-x-2">
                <i class="fa-solid fa-user text-red-600"></i>
                <span>Patient Information</span>
            </h2>

            <div class="mb-6">
                <label class="block text-sm font-medium text-slate-600 mb-2">Prediction Mode</label>
                <div class="flex gap-3">
                    <button onclick="switchMode('patient_id')" id="btn-patient"
                        class="flex-1 px-4 py-2.5 rounded-2xl bg-red-600 text-white font-medium text-sm flex items-center justify-center gap-x-2">
                        <i class="fa-solid fa-id-card"></i>
                        <span>Use Patient ID</span>
                    </button>
                    <button onclick="switchMode('manual')" id="btn-manual"
                        class="flex-1 px-4 py-2.5 rounded-2xl bg-slate-100 hover:bg-slate-200 text-slate-700 font-medium text-sm flex items-center justify-center gap-x-2">
                        <i class="fa-solid fa-edit"></i>
                        <span>Enter Features Manually</span>
                    </button>
                </div>
            </div>

            <!-- Patient ID Mode -->
            <div id="patient-mode">
                <div class="mb-6">
                    <label class="block text-sm font-medium text-slate-600 mb-1.5">Patient ID</label>
                    <input type="text" id="patient_id" value="0"
                        class="w-full px-4 py-3 border border-slate-200 rounded-2xl focus:outline-none focus:border-red-300">
                    <p class="text-xs text-slate-500 mt-1.5">Features will be fetched from Online Feature Store</p>
                </div>
            </div>

            <!-- Manual Input Mode -->
            <div id="manual-mode" class="hidden">
                <div class="grid grid-cols-2 gap-x-4 gap-y-5">
                    <div><label class="text-xs font-medium text-slate-500">Age</label><input type="number" id="age" value="63" class="input-field"></div>
                    <div><label class="text-xs font-medium text-slate-500">Sex (0=F, 1=M)</label><input type="number" id="sex" value="1" class="input-field"></div>
                    <div><label class="text-xs font-medium text-slate-500">Chest Pain Type</label><input type="number" id="cp" value="3" class="input-field"></div>
                    <div><label class="text-xs font-medium text-slate-500">Resting BP</label><input type="number" id="trestbps" value="145" class="input-field"></div>
                    <div><label class="text-xs font-medium text-slate-500">Cholesterol</label><input type="number" id="chol" value="233" class="input-field"></div>
                    <div><label class="text-xs font-medium text-slate-500">Fasting Blood Sugar</label><input type="number" id="fbs" value="1" class="input-field"></div>
                    <div><label class="text-xs font-medium text-slate-500">Rest ECG</label><input type="number" id="restecg" value="0" class="input-field"></div>
                    <div><label class="text-xs font-medium text-slate-500">Max Heart Rate</label><input type="number" id="thalach" value="150" class="input-field"></div>
                    <div><label class="text-xs font-medium text-slate-500">Exercise Angina</label><input type="number" id="exang" value="0" class="input-field"></div>
                    <div><label class="text-xs font-medium text-slate-500">Oldpeak</label><input type="number" step="0.1" id="oldpeak" value="2.3" class="input-field"></div>
                    <div><label class="text-xs font-medium text-slate-500">Slope</label><input type="number" id="slope" value="0" class="input-field"></div>
                    <div><label class="text-xs font-medium text-slate-500">CA</label><input type="number" id="ca" value="0" class="input-field"></div>
                    <div class="col-span-2"><label class="text-xs font-medium text-slate-500">Thal</label><input type="number" id="thal" value="1" class="input-field"></div>
                </div>
            </div>

            <button onclick="makePrediction()"
                class="mt-8 w-full bg-red-600 hover:bg-red-700 transition-colors text-white font-semibold py-3.5 rounded-2xl flex items-center justify-center gap-x-2 text-base shadow-sm">
                <i class="fa-solid fa-magnifying-glass"></i>
                <span>Predict Heart Disease Risk</span>
            </button>
        </div>

        <!-- Result Section -->
        <div id="result-section" class="hidden mt-6">
            <div class="bg-white rounded-3xl shadow-sm border p-8">
                <h3 class="text-lg font-semibold mb-4">Prediction Result</h3>
                
                <div id="result-card" 
                     class="rounded-2xl p-6 text-center">
                    <!-- Dynamic content injected by JS -->
                </div>
            </div>
        </div>

    </div>

    <script>
        function switchMode(mode) {
            const patientMode = document.getElementById('patient-mode');
            const manualMode = document.getElementById('manual-mode');
            const btnPatient = document.getElementById('btn-patient');
            const btnManual = document.getElementById('btn-manual');

            if (mode === 'patient_id') {
                patientMode.classList.remove('hidden');
                manualMode.classList.add('hidden');
                btnPatient.classList.add('bg-red-600', 'text-white');
                btnPatient.classList.remove('bg-slate-100', 'text-slate-700');
                btnManual.classList.remove('bg-red-600', 'text-white');
                btnManual.classList.add('bg-slate-100', 'text-slate-700');
            } else {
                patientMode.classList.add('hidden');
                manualMode.classList.remove('hidden');
                btnManual.classList.add('bg-red-600', 'text-white');
                btnManual.classList.remove('bg-slate-100', 'text-slate-700');
                btnPatient.classList.remove('bg-red-600', 'text-white');
                btnPatient.classList.add('bg-slate-100', 'text-slate-700');
            }
        }

        async function makePrediction() {
            const resultSection = document.getElementById('result-section');
            const resultCard = document.getElementById('result-card');
            resultSection.classList.remove('hidden');

            let payload = {};
            const patientModeVisible = !document.getElementById('patient-mode').classList.contains('hidden');

            if (patientModeVisible) {
                const patientId = document.getElementById('patient_id').value;
                payload = { patient_id: patientId };
            } else {
                payload = {
                    features: {
                        age: parseFloat(document.getElementById('age').value),
                        sex: parseFloat(document.getElementById('sex').value),
                        cp: parseFloat(document.getElementById('cp').value),
                        trestbps: parseFloat(document.getElementById('trestbps').value),
                        chol: parseFloat(document.getElementById('chol').value),
                        fbs: parseFloat(document.getElementById('fbs').value),
                        restecg: parseFloat(document.getElementById('restecg').value),
                        thalach: parseFloat(document.getElementById('thalach').value),
                        exang: parseFloat(document.getElementById('exang').value),
                        oldpeak: parseFloat(document.getElementById('oldpeak').value),
                        slope: parseFloat(document.getElementById('slope').value),
                        ca: parseFloat(document.getElementById('ca').value),
                        thal: parseFloat(document.getElementById('thal').value)
                    }
                };
            }

            try {
                const response = await fetch('http://localhost:8000/predict', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.detail || 'Prediction failed');
                }

                displaySimplifiedResult(data, resultCard);

            } catch (error) {
                resultCard.innerHTML = `
                    <div class="text-red-600">
                        <i class="fa-solid fa-exclamation-triangle text-3xl mb-3"></i>
                        <p class="font-semibold">Error</p>
                        <p class="text-sm">${error.message}</p>
                    </div>
                `;
            }
        }

        function displaySimplifiedResult(data, resultCard) {
            const isHighRisk = data.final_prediction === 1;
            
            const bgColor = isHighRisk ? 'bg-red-50 border-red-200' : 'bg-emerald-50 border-emerald-200';
            const textColor = isHighRisk ? 'text-red-700' : 'text-emerald-700';
            const icon = isHighRisk ? 'fa-exclamation-triangle' : 'fa-check-circle';

            resultCard.innerHTML = `
                <div class="${bgColor} border rounded-2xl p-8">
                    <div class="flex justify-center mb-4">
                        <i class="fa-solid ${icon} text-6xl ${textColor}"></i>
                    </div>
                    
                    <div class="text-3xl font-bold mb-2 ${textColor}">
                        ${data.final_status}
                    </div>
                    
                    <div class="text-lg text-slate-600 mb-6">
                        Average Risk Probability: <span class="font-semibold">${data.average_probability}</span>
                    </div>

                    <div class="text-sm text-slate-500">
                        This prediction is based on ensemble of multiple models.
                    </div>
                </div>
            `;
        }

        // Default to Patient ID mode
        window.onload = function() {
            switchMode('patient_id');
        }
    </script>
</body>
</html>
