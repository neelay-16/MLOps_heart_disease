version: '3.8'

services:
  # FastAPI Application
  heart-disease-api:
    build:
      context: .
      dockerfile: Dockerfile.api          # ← Using the new Dockerfile
    container_name: heart_disease_api
    ports:
      - "8000:8000"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - redis
    volumes:
      - ./artifacts:/app/artifacts
    restart: unless-stopped

  # Redis (Online Feature Store)
  redis:
    image: redis:7-alpine
    container_name: heart_disease_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  redis_data: