apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlops-project1
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mlops-project1
  template:
    metadata:
      labels:
        app: mlops-project1
    spec:
      containers:
      - name: mlops-project1
        image: gcr.io/infra-window-453718-m0/mlops-project1:latest
        ports:
        - containerPort: 8000
        env:
        - name: REDIS_HOST
          value: "redis"
        - name: REDIS_PORT_NUMBER
          value: "6379"
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        imagePullPolicy: Always